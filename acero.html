<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acero - Fashion Collection</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        /* Paleta de colores pastel en tonos rosados */
        :root {
            --color-rose-gold: #f8c8dc;
            --color-shimmer: #ffeaf4;
            --color-nude: #fdd5e4;
            --color-blush: #ffe6e9;
            --color-accent: #eab5c4;
            --color-deep-rose: #d48ca2;
        }

        /* Estilos base */
        body {
            font-family: 'Poppins', sans-serif;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo con degradado animado inspirado en maquillaje */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg,
                    var(--color-rose-gold),
                    var(--color-shimmer),
                    var(--color-blush),
                    var(--color-accent));
            background-size: 400% 400%;
            z-index: -1;
            animation: gradientMove 20s ease infinite;
            opacity: 0.25;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .makeup-decorations {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .floating-makeup {
            position: fixed;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 8s ease-in-out infinite;
        }

        .lipstick { top: 20%; left: 10%; animation-delay: 0s; }
        .brush { top: 60%; right: 15%; animation-delay: 2s; }
        .compact { bottom: 30%; left: 20%; animation-delay: 4s; }
        .sparkle { top: 40%; right: 30%; animation-delay: 6s; }

        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Encabezado degradado */
        .header {
            background: linear-gradient(135deg, var(--color-rose-gold), var(--color-accent));
            color: white;
            padding: 4rem 0;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        /* Tarjetas de producto */
        .product-card {
            transition: all 0.3s;
            border-radius: 15px;
            overflow: hidden;
            border: none;
            margin-bottom: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(192,108,132,0.15);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
            transition: all 0.3s;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .price-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-deep-rose));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(192,108,132,0.2);
        }
        /* Barra de navegación */
        .navbar {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .quantity-input {
            max-width: 70px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid var(--color-accent);
        }

        /* Botones personalizados */
        .btn-primary {
            background: linear-gradient(135deg, var(--color-accent), var(--color-deep-rose));
            border: none;
            border-radius: 25px;
            padding: 0.8rem 2rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(192,108,132,0.3);
        }

        .btn-outline-primary {
            border-color: var(--color-accent);
            color: var(--color-accent);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .btn-outline-primary:hover {
            background-color: var(--color-shimmer);
            color: var(--color-accent);
        }

        .product-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product-card {
            width: 300px;
            background: #fff0f5;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            margin: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .product-image {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-image:hover img {
            transform: scale(1.05);
        }

        .price-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ffc8dd, #f9c6d3);
            color: #fff;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-title {
            font-size: 1.2rem;
            color: #a84d7a;
            margin: 10px 0 5px;
        }

        .product-description {
            font-size: 0.95rem;
            color: #7b2b51;
            margin-bottom: 15px;
        }

        .quantity-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        .quantity-btn {
            background: #ffc8dd;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .quantity-btn:hover {
            background: #f9a1bb;
        }

        .quantity-input {
            width: 50px;
            text-align: center;
            border: 1px solid #ffc8dd;
            border-radius: 8px;
            padding: 5px;
        }

        .add-to-cart {
            width: 100%;
            background: linear-gradient(135deg, #f9c6d3, #f7a4b8);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(249, 198, 211, 0.7);
        }
    </style>
</head>
<body>
    <!-- Íconos flotantes para decorar la página -->
    <div class="makeup-decorations">
        <i class="fas fa-heart floating-makeup lipstick"></i>
        <i class="fas fa-magic floating-makeup brush"></i>
        <i class="fas fa-gem floating-makeup compact"></i>
        <i class="fas fa-star floating-makeup sparkle"></i>
    </div>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-gem me-2" style="color: var(--color-accent);"></i>Fashion Collection
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="bisuteria.html">Bisutería</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="maquillaje.html">Maquillaje</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="acero.html">Acero</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="acrilico.html">Acrílico</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ofertas.html">Ofertas</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-primary" href="carrito.html">
                            <i class="fas fa-shopping-cart me-1"></i> Carrito
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Acero Inoxidable</h1>
            <p class="lead">Descubre nuestra colección de joyería en acero inoxidable</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Filter Controls -->
        <div class="mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" class="form-control" id="searchInput" placeholder="Buscar productos...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sortSelect">
                        <option value="newest">Más recientes</option>
                        <option value="price-asc">Precio: menor a mayor</option>
                        <option value="price-desc">Precio: mayor a menor</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" id="tipBtn">
                        <i class="fas fa-lightbulb me-1"></i> Tip de Acero
                    </button>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="product-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartCounter();
        });

        async function loadProducts() {
            try {
                const productsGrid = document.getElementById('productsGrid');
                const loadingState = document.getElementById('loadingState');

                // Mostrar estado de carga
                loadingState.style.display = 'block';

                // Obtener productos de Firebase
                const snapshot = await firebase.firestore()
                    .collection('products')
                    .where('category', '==', 'Acero')
                    .get();

                // Ocultar estado de carga
                loadingState.style.display = 'none';

                // Renderizar productos
                let html = '';
                snapshot.forEach(doc => {
                    const product = doc.data();
                    html += `
                        <div>
                            <div class="product-card">
                                <div class="product-image">
                                    <img src="${product.image || 'https://via.placeholder.com/300'}" alt="${product.name}">
                                    <div class="price-badge">L.${product.price}</div>
                                </div>
                                <div class="product-info">
                                    <h3 class="product-title">${product.name}</h3>
                                    <p class="product-description">${product.description || ''}</p>
                                    <div class="quantity-selector">
                                        <button class="quantity-btn" onclick="decreaseQuantity(this)">-</button>
                                        <input type="number" id="qty-${doc.id}" class="quantity-input" value="1" min="1">
                                        <button class="quantity-btn" onclick="increaseQuantity(this)">+</button>
                                    </div>
                                    <button class="add-to-cart" onclick="addToCart('${doc.id}')">🛒 Agregar al Carrito</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                productsGrid.innerHTML = html || '<div class="col-12 text-center py-5">No se encontraron productos</div>';

            } catch (error) {
                console.error('Error cargando productos:', error);
                document.getElementById('productsGrid').innerHTML = 
                    '<div class="col-12 text-center py-5">Error cargando productos</div>';
            }
        }

        function addToCart(productId) {
            const qtyInput = document.getElementById('qty-' + productId);
            const qty = parseInt(qtyInput ? qtyInput.value : '1', 10) || 1;

            let cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            const product = allProducts.find(p => p.id === productId) || {};
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    image: product.image || product.imageUrl,
                    quantity: qty
                });
            }

            localStorage.setItem('fashionCart', JSON.stringify(cart));

            Swal.fire({
                icon: 'success',
                title: 'Producto agregado',
                text: `Producto agregado al carrito (${qty} uds)`,
                timer: 2000,
                showConfirmButton: false
            });

            updateCartCounter();
        }

        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            const badges = document.querySelectorAll('.cart-badge, .cart-counter, .cart-count');
            badges.forEach(el => {
                el.textContent = totalItems;
                el.style.display = totalItems > 0 ? 'inline' : 'none';
            });
        }

        // Consejos para el cuidado del acero
        const tips = [
            'Limpia las piezas con agua tibia y jabón neutro.',
            'Guarda tu joyería de acero por separado para evitar rayones.',
            'Evita el contacto con productos químicos fuertes.',
            'Seca bien el acero después de mojarlo para prevenir manchas.'
        ];

        document.getElementById('tipBtn').addEventListener('click', () => {
            const tip = tips[Math.floor(Math.random() * tips.length)];
            Swal.fire('Consejo de acero', tip, 'info');
        });
    </script>
    <script type="module" src="js/maintenance.js"></script>
    <script>
    function increaseQuantity(button) {
        const input = button.parentElement.querySelector('.quantity-input');
        input.value = parseInt(input.value) + 1;
    }

    function decreaseQuantity(button) {
        const input = button.parentElement.querySelector('.quantity-input');
        if (parseInt(input.value) > 1) {
            input.value = parseInt(input.value) - 1;
        }
    }
    </script>
</body>
</html>
