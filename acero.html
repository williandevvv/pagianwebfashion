<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acero - Fashion Collection</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="css/acero.css">
</head>
<body>
    <!-- Íconos flotantes para decorar la página -->
    <div class="makeup-decorations">
        <i class="fas fa-heart floating-makeup lipstick"></i>
        <i class="fas fa-magic floating-makeup brush"></i>
        <i class="fas fa-gem floating-makeup compact"></i>
        <i class="fas fa-star floating-makeup sparkle"></i>
    </div>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-gem me-2" style="color: var(--color-accent);"></i>Fashion Collection
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="bisuteria.html">Bisutería</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="maquillaje.html">Maquillaje</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="acero.html">Acero</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="acrilico.html">Acrílico</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ofertas.html">Ofertas</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-primary" href="carrito.html">
                            <i class="fas fa-shopping-cart me-1"></i> Carrito
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Acero Inoxidable</h1>
            <p class="lead">Descubre nuestra colección de joyería en acero inoxidable</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Filter Controls -->
        <div class="mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" class="form-control" id="searchInput" placeholder="Buscar productos...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sortSelect">
                        <option value="newest">Más recientes</option>
                        <option value="price-asc">Precio: menor a mayor</option>
                        <option value="price-desc">Precio: mayor a menor</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" id="tipBtn">
                        <i class="fas fa-lightbulb me-1"></i> Tip de Acero
                    </button>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="product-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

        <nav aria-label="Paginación" class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <script>
        let allProducts = [];
        let currentPage = 1;
        const productsPerPage = 30;

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartCounter();
        });

        async function loadProducts() {
            try {
                const productsGrid = document.getElementById('productsGrid');
                const loadingState = document.getElementById('loadingState');

                // Mostrar estado de carga
                loadingState.style.display = 'block';

                // Obtener productos de Firebase
                const snapshot = await firebase.firestore()
                    .collection('products')
                    .where('category', '==', 'Acero')
                    .get();

                // Ocultar estado de carga
                loadingState.style.display = 'none';

                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                currentPage = 1;
                displayProducts();

            } catch (error) {
                console.error('Error cargando productos:', error);
                document.getElementById('productsGrid').innerHTML =
                    '<div class="col-12 text-center py-5">Error cargando productos</div>';
            }
        }

        function displayProducts() {
            const productsGrid = document.getElementById('productsGrid');
            const start = (currentPage - 1) * productsPerPage;
            const end = start + productsPerPage;
            const toShow = allProducts.slice(start, end);

            productsGrid.innerHTML = '';

            if (toShow.length === 0) {
                productsGrid.innerHTML = '<div class="col-12 text-center py-5">No se encontraron productos</div>';
                renderPagination(allProducts.length);
                return;
            }

            toShow.forEach(product => {
                const html = `
                    <div>
                        <div class="product-card">
                            <div class="product-image">
                                <img src="${product.image || 'https://via.placeholder.com/300'}" alt="${product.name}">
                                <div class="price-badge">L.${product.price}</div>
                            </div>
                            <div class="product-info">
                                <h3 class="product-title">${product.name}</h3>
                                <p class="product-description">${product.description || ''}</p>
                                <div class="quantity-selector">
                                    <button class="quantity-btn" onclick="decreaseQuantity(this)">-</button>
                                    <input type="number" id="qty-${product.id}" class="quantity-input" value="1" min="1">
                                    <button class="quantity-btn" onclick="increaseQuantity(this)">+</button>
                                </div>
                                <button class="add-to-cart" onclick="addToCart('${product.id}')">🛒 Agregar al Carrito</button>
                            </div>
                        </div>
                    </div>`;
                productsGrid.insertAdjacentHTML('beforeend', html);
            });

            renderPagination(allProducts.length);
        }

        function renderPagination(totalItems) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;

            const totalPages = Math.ceil(totalItems / productsPerPage);
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${currentPage - 1}">Anterior</a>
                </li>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>`;
            }

            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${currentPage + 1}">Siguiente</a>
                </li>`;

            pagination.innerHTML = html;
        }

        document.addEventListener('click', (e) => {
            if (e.target.closest('#pagination .page-link')) {
                e.preventDefault();
                const page = parseInt(e.target.dataset.page);
                const totalPages = Math.ceil(allProducts.length / productsPerPage);
                if (!isNaN(page) && page >= 1 && page <= totalPages) {
                    currentPage = page;
                    displayProducts();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        });

        function addToCart(productId) {
            const qtyInput = document.getElementById('qty-' + productId);
            const qty = parseInt(qtyInput ? qtyInput.value : '1', 10) || 1;

            let cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            const product = allProducts.find(p => p.id === productId) || {};
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    id: productId,
                    name: product.name,
                    price: product.price,
                    image: product.image || product.imageUrl,
                    quantity: qty
                });
            }

            localStorage.setItem('fashionCart', JSON.stringify(cart));

            Swal.fire({
                icon: 'success',
                title: 'Producto agregado',
                text: `Producto agregado al carrito (${qty} uds)`,
                timer: 2000,
                showConfirmButton: false
            });

            updateCartCounter();
        }

        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            const badges = document.querySelectorAll('.cart-badge, .cart-counter, .cart-count');
            badges.forEach(el => {
                el.textContent = totalItems;
                el.style.display = totalItems > 0 ? 'inline' : 'none';
            });
        }

        // Consejos para el cuidado del acero
        const tips = [
            'Limpia las piezas con agua tibia y jabón neutro.',
            'Guarda tu joyería de acero por separado para evitar rayones.',
            'Evita el contacto con productos químicos fuertes.',
            'Seca bien el acero después de mojarlo para prevenir manchas.'
        ];

        document.getElementById('tipBtn').addEventListener('click', () => {
            const tip = tips[Math.floor(Math.random() * tips.length)];
            Swal.fire('Consejo de acero', tip, 'info');
        });
    </script>
    <script type="module" src="js/maintenance.js"></script>
    <script>
    function increaseQuantity(button) {
        const input = button.parentElement.querySelector('.quantity-input');
        input.value = parseInt(input.value) + 1;
    }

    function decreaseQuantity(button) {
        const input = button.parentElement.querySelector('.quantity-input');
        if (parseInt(input.value) > 1) {
            input.value = parseInt(input.value) - 1;
        }
    }
    </script>
</body>
</html>
