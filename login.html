<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Accede a tu cuenta para gestionar tus pedidos.">
    <meta name="keywords" content="login, iniciar sesión, Fashion Collection">
    <link rel="canonical" href="https://fashioncollection.com/login.html">
    <title>Iniciar Sesión - Fashion Collection</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <!-- Google Fonts: Para un toque más estético y moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Header -->
    <header class="header py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a class="navbar-brand" href="index.html">
                    <h1 class="h4 mb-0">Fashion Collection</h1>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container d-flex flex-grow-1 align-items-center justify-content-center">
        <!-- Contenedor de Inicio de Sesión -->
        <div class="auth-container">
            <div class="auth-header">
                <img src="img/LOGOFS.png" alt="Logo" onerror="this.src='...'">
                <h2>Bienvenida a tu Fashion</h2>
                <p class="text-muted">Inicia sesión para descubrir tu belleza</p>
            </div>

            <!-- Formulario de Inicio de Sesión -->
            <form id="login-form">
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="login-email" placeholder="tu.email@gmail.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="login-password" placeholder="********" required>
                    </div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me">
                    <label class="form-check-label" for="remember-me">Recordarme</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                </button>
            </form>

            <!-- Login Social -->
            <div class="social-login">
                <div class="divider">
                    <span>O continúa con</span>
                </div>
                <button class="social-btn google-btn mb-2 google-login-btn">
                    <i class="fab fa-google"></i>Continuar con Google
                </button>
                <button class="social-btn facebook-btn">
                    <i class="fab fa-facebook-f"></i>Continuar con Facebook
                </button>
            </div>

            <!-- Pie de Página de Autenticación -->
            <div class="auth-footer">
                <p class="mb-0">¿Aún no tienes cuenta? <a href="#" id="show-register">Regístrate y crea tu cuenta</a></p>
                <a href="#" class="d-block mt-2 small" id="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>
        </div>

        <!-- Contenedor de Registro (Oculto por defecto) -->
        <div class="auth-container d-none" id="register-container">
            <div class="auth-header">
                <img src="img/LOGOFS.png" alt="Logo" onerror="this.src='...'">
                <h2>Crea tu Cuenta</h2>
                <p class="text-muted">Únete a la comunidad de belleza</p>
            </div>

            <form id="register-form">
                <div class="mb-3">
                    <label for="register-name" class="form-label">Nombre Completo</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="register-name" placeholder="Tu Nombre y Apellido" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="register-email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="register-email" placeholder="tu.email@gmail.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="register-password" class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="register-password" placeholder="Crea una contraseña segura" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="register-confirm-password" class="form-label">Confirmar Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="register-confirm" placeholder="Confirma tu contraseña" required>
                    </div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">
                        Acepto los <a href="#">Términos y Condiciones</a>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-user-plus me-2"></i>Crear Cuenta
                </button>
            </form>

            <div class="auth-footer">
                <p class="mb-0">¿Ya tienes una cuenta? <a href="#" id="show-login">Inicia Sesión</a></p>
            </div>
        </div>
    </main>

    <!-- Contenedor de Toast (Notificaciones) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast-notification" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase SDK (asegúrate de tener tus archivos firebase-config.js y auth.js) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginContainer = document.querySelector('.auth-container:not(#register-container)');
            const registerContainer = document.querySelector('#register-container');
            const showRegisterBtn = document.querySelector('#show-register');
            const showLoginBtn = document.querySelector('#show-login');

            // Alternar entre formularios de inicio de sesión y registro
            showRegisterBtn.addEventListener('click', (e) => {
                e.preventDefault();
                loginContainer.classList.add('d-none');
                registerContainer.classList.remove('d-none');
            });

            showLoginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                registerContainer.classList.add('d-none');
                loginContainer.classList.remove('d-none');
            });

            // Manejar la funcionalidad de "Olvidé mi contraseña"
            const forgotPasswordBtn = document.querySelector('#forgot-password');
            forgotPasswordBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                
                const { value: email } = await Swal.fire({
                    title: 'Recuperar Contraseña',
                    input: 'email',
                    inputLabel: 'Tu dirección de email',
                    inputPlaceholder: 'Ingresa tu email',
                    showCancelButton: true,
                    confirmButtonText: 'Enviar',
                    cancelButtonText: 'Cancelar',
                    validationMessage: 'Debe ser un email válido',
                    customClass: {
                        confirmButton: 'btn btn-primary',
                        cancelButton: 'btn btn-secondary'
                    },
                    buttonsStyling: false
                });

                if (email) {
                    try {
                        // Asumiendo que firebase.auth() está inicializado en firebase-config.js
                        await firebase.auth().sendPasswordResetEmail(email);
                        Swal.fire({
                            icon: 'success',
                            title: 'Email Enviado',
                            text: 'Revisa tu bandeja de entrada para restablecer tu contraseña',
                            customClass: {
                                confirmButton: 'btn btn-primary'
                            },
                            buttonsStyling: false
                        });
                    } catch (error) {
                        Swal.fire({
                            icon: 'error',
                            title: 'Error',
                            text: 'No se pudo enviar el email de recuperación. Verifica la dirección e intenta nuevamente.',
                            customClass: {
                                confirmButton: 'btn btn-primary'
                            },
                            buttonsStyling: false
                        });
                    }
                }
            });
        });
    </script>
    <script type="module" src="js/maintenance.js"></script>
</body>
</html>
