<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devoluciones - Fashion Collection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --color-rose-gold: #fca5a5;
      --color-shimmer: #f9a8d4;
      --color-nude: #fed7aa;
      --color-blush: #f472b6;
      --color-accent: #fb923c;
    }
    body { background-color:#fff; font-family:'Poppins',sans-serif; }
    header {
      background: linear-gradient(135deg, rgba(252,165,165,0.95), rgba(236,72,153,0.95));
      backdrop-filter: blur(10px);
      color: white;
      padding: 1rem 0;
    }
    footer {
      background: linear-gradient(to right,#2c2c2c,#1a1a1a);
      color: white;
      padding: 60px 0 20px;
    }
  </style>
</head>
<body>
  <header class="modern-header">
    <div class="logo">Fashion Collection</div>
    <div class="search-box">
      <input type="text" placeholder="Buscar..." />
    </div>
    <div class="icons">
      <a href="perfil.html" id="profile-link" style="display:none;">👤</a>
      <a href="carrito.html">🛒</a>
    </div>
  </header>

  <main class="container py-5">
    <h1 class="mb-4" style="color: var(--color-accent); font-family:'Playfair Display',serif;">Devoluciones</h1>
    <p>Si no estás satisfecho con tu compra puedes devolverla en un plazo de 30 días. Escríbenos a <strong>soporte@fashioncollection.com</strong> o llámanos al <strong>+504 2244-5566</strong>.</p>
  </main>

  <footer>
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 Fashion Collection. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (window.usuarioAutenticadoFirebase) {
      document.getElementById('profile-link').style.display = 'block';
    } else {
      document.getElementById('profile-link').style.display = 'none';
    }
  </script>
</body>
</html>
