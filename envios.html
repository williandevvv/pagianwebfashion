<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envíos - Fashion Collection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-rose-gold: #bd8c7d;
      --color-shimmer: #f4e4e1;
      --color-nude: #e8c6b6;
      --color-blush: #f7cac9;
      --color-accent: #c06c84;
    }
    body { background-color:#fff; font-family:'Poppins',sans-serif; }
    header {
      background: linear-gradient(135deg, rgba(189,140,125,0.95), rgba(192,108,132,0.95));
      backdrop-filter: blur(10px);
      color: white;
      padding: 1rem 0;
    }
    footer {
      background: linear-gradient(to right,#2c2c2c,#1a1a1a);
      color: white;
      padding: 60px 0 20px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand text-white" href="index" style="font-family:'Playfair Display', serif;">Fashion Collection</a>
      <nav class="d-none d-md-flex">
        <a href="index" class="text-white text-decoration-none me-4">Inicio</a>
        <a href="ofertas" class="text-white text-decoration-none me-4">Ofertas</a>
        <a href="contacto" class="text-white text-decoration-none">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="container py-5">
    <h1 class="mb-4" style="color: var(--color-accent); font-family:'Playfair Display',serif;">Envíos</h1>
    <p>Realizamos envíos a todo Honduras en un plazo de 2 a 3 días hábiles. El costo estándar es de <strong>L.150</strong> por pedido. Para consultas llama al <strong>+504 2233-4455</strong>.</p>
  </main>

  <footer>
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 Fashion Collection. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
