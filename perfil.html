<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Consulta y edita tus datos personales y pedidos.">
    <meta name="keywords" content="perfil, cuenta, Fashion Collection">
    <link rel="canonical" href="https://fashioncollection.com/perfil.html">
    <title>Mi Perfil - Fashion Collection</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
    <!-- Íconos flotantes de maquillaje para decorar la página -->
    <div class="makeup-decorations">
        <i class="fas fa-heart floating-makeup lipstick"></i>
        <i class="fas fa-magic floating-makeup brush"></i>
        <i class="fas fa-gem floating-makeup compact"></i>
        <i class="fas fa-star floating-makeup sparkle"></i>
    </div>
    <!-- Header -->
    <header class="header py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <a class="navbar-brand me-5" href="index.html">
                        <h1 class="h4 text-white mb-0">Fashion Collection</h1>
                    </a>
                    <nav class="d-none d-md-flex align-items-center">
                        <a class="text-white text-decoration-none me-4" href="index.html">Inicio</a>
                    </nav>
                </div>
                <div class="d-flex align-items-center">
                    <a href="carrito.html" class="position-relative text-white me-4">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span class="cart-badge">0</span>
                    </a>
                    <div class="dropdown">
                        <button class="btn btn-link text-white text-decoration-none dropdown-toggle profile-icon-btn" type="button" data-bs-toggle="dropdown">
                            <img id="navbar-avatar" src="img/default-avatar.svg" alt="Avatar" />
                            <span id="navbar-username">Usuario</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item active" href="#"><i class="fas fa-user"></i> Mi Perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item text-danger" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Profile Container -->
        <div id="profile-container">
            <div class="profile-container">
                <!-- Profile Header -->
                <div class="profile-header">
                    <img src="img/default-avatar.svg" alt="Profile" class="profile-avatar" id="profile-avatar">
                    <h2 class="mb-1" id="profile-display-name">Nombre del Usuario</h2>
                    <p class="text-muted mb-0" id="profile-email">usuario@email.com</p>
                </div>

                <!-- Profile Navigation -->
                <ul class="nav nav-pills mb-4 justify-content-center" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="pill" href="#profile">
                            <i class="fas fa-user me-2"></i>Perfil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="pill" href="#orders">
                            <i class="fas fa-shopping-bag me-2"></i>Pedidos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="pill" href="#addresses">
                            <i class="fas fa-map-marker-alt me-2"></i>Direcciones
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="pill" href="#security">
                            <i class="fas fa-shield-alt me-2"></i>Seguridad
                        </a>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content">
                    <!-- Profile Tab -->
                    <div class="tab-pane fade show active" id="profile">
                        <form id="profile-form">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="profile-name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Apellido</label>
                                    <input type="text" class="form-control" id="profile-lastname">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="profile-email-input" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="profile-phone">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="profile-birthdate">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Género</label>
                                    <select class="form-select" id="profile-gender">
                                        <option value="">Seleccionar...</option>
                                        <option value="male">Masculino</option>
                                        <option value="female">Femenino</option>
                                        <option value="other">Otro</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Foto de Perfil</label>
                                <input type="file" class="form-control" id="profile-image" accept="image/*">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Guardar Cambios
                            </button>
                        </form>
                    </div>

                    <!-- Orders Tab -->
                    <div class="tab-pane fade" id="orders">
                        <div id="pedidosContainer" class="row g-4 pedidos-lista"></div>
                    </div>

                    <!-- Addresses Tab -->
                    <div class="tab-pane fade" id="addresses">
                        <form id="address-form" class="mb-4">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <input type="text" class="form-control" id="address-line" placeholder="Dirección" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="text" class="form-control" id="address-city" placeholder="Ciudad" required>
                                </div>
                            </div>
                            <div class="row g-3 mt-2">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="address-state" placeholder="Departamento" required>
                                </div>
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="address-zip" placeholder="Código Postal">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary mt-3">
                                <i class="fas fa-plus me-1"></i>Agregar Dirección
                            </button>
                        </form>
                        <div id="addresses-container" class="row g-4"></div>
                    </div>

                    <!-- Security Tab -->
                    <div class="tab-pane fade" id="security">
                        <form id="password-form" class="mb-4">
                            <h5 class="mb-3">Cambiar Contraseña</h5>
                            <div class="mb-3">
                                <label class="form-label">Contraseña Actual</label>
                                <input type="password" class="form-control" id="current-password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nueva Contraseña</label>
                                <input type="password" class="form-control" id="new-password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirmar Nueva Contraseña</label>
                                <input type="password" class="form-control" id="confirm-password" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-key me-2"></i>Actualizar Contraseña
                            </button>
                        </form>

                        <hr>

                        <div class="mt-4">
                            <h5 class="mb-3">Eliminar Cuenta</h5>
                            <p class="text-muted">Esta acción es permanente y no se puede deshacer.</p>
                            <button class="btn btn-danger" id="delete-account-btn">
                                <i class="fas fa-trash-alt me-2"></i>Eliminar mi cuenta
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast-notification" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>

    <script>
        // Configurar logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await firebase.auth().signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error cerrando sesión:', error);
            }
        });
    </script>
    <script type="module" src="js/maintenance.js"></script>

</body>
</html>
