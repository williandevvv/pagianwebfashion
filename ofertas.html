<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas - Fashion Collection</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        /* Paleta de colores unificada */
        :root {
            --color-rose-gold: #fca5a5;
            --color-shimmer: #f9a8d4;
            --color-nude: #fed7aa;
            --color-blush: #f472b6;
            --color-accent: #fb923c;
            --color-deep-rose: #ec4899;
        }

        /* Estilos base */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff;
            color: #333;
        }

        /* Encabezado degradado */
        .header {
            background: linear-gradient(135deg, var(--color-rose-gold), var(--color-accent));
            color: white;
            padding: 4rem 0;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: "🔥";
            position: absolute;
            font-size: 8rem;
            opacity: 0.1;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
        }
        /* Tarjetas de producto */
        .product-card {
            transition: all 0.3s;
            border-radius: 15px;
            overflow: hidden;
            border: none;
            margin-bottom: 20px;
            background: white;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(236,72,153,0.15);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
            transition: all 0.3s;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .price-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-deep-rose));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(236,72,153,0.2);
        }
        .discount-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--color-blush);
            color: var(--color-deep-rose);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .original-price {
            text-decoration: line-through;
            color: #6c757d;
            font-size: 0.9rem;
        }
        .sale-price {
            color: var(--color-deep-rose);
            font-weight: bold;
            font-size: 1.1rem;
        }
        /* Barra de navegación */
        .navbar {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .filter-controls {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            border: 1px solid var(--color-shimmer);
        }
        .quantity-input {
            max-width: 70px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid var(--color-accent);
        }

        /* Botones personalizados */
        .btn-outline-primary {
            border-color: var(--color-accent);
            color: var(--color-accent);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .btn-outline-primary:hover {
            background-color: var(--color-shimmer);
            color: var(--color-accent);
        }
        .countdown-timer {
            background: linear-gradient(45deg, var(--color-accent), var(--color-deep-rose));
            color: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="ofertas">
    <header class="modern-header">
      <div class="logo">Fashion Collection</div>
      <div class="search-box">
        <input type="text" placeholder="Buscar..." />
      </div>
      <div class="icons">
        <a href="perfil.html" id="profile-link" style="display:none;">👤</a>
        <a href="carrito.html">🛒</a>
      </div>
    </header>
    <div class="makeup-decorations">
      <div class="floating-makeup lipstick">💄</div>
      <div class="floating-makeup brush">🖌️</div>
      <div class="floating-makeup compact">🪞</div>
      <div class="floating-makeup sparkle">✨</div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Countdown Timer -->
        <div class="countdown-timer">
            <h4 class="mb-3">⏰ ¡Oferta por tiempo limitado!</h4>
            <div class="row text-center">
                <div class="col-3">
                    <div class="h2" id="days">00</div>
                    <small>Días</small>
                </div>
                <div class="col-3">
                    <div class="h2" id="hours">00</div>
                    <small>Horas</small>
                </div>
                <div class="col-3">
                    <div class="h2" id="minutes">00</div>
                    <small>Minutos</small>
                </div>
                <div class="col-3">
                    <div class="h2" id="seconds">00</div>
                    <small>Segundos</small>
                </div>
            </div>
        </div>

        <!-- Filter Controls -->
        <div class="filter-controls">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Buscar ofertas...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="categoryFilter">
                        <option value="">Todas las categorías</option>
                        <option value="Bisutería">Bisutería</option>
                        <option value="Maquillaje">Maquillaje</option>
                        <option value="Acero">Acero</option>
                        <option value="Acrílico">Acrílico</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="discountFilter">
                        <option value="">Todos los descuentos</option>
                        <option value="10">10% o más</option>
                        <option value="20">20% o más</option>
                        <option value="30">30% o más</option>
                        <option value="50">50% o más</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" id="sortSelect">
                        <option value="discount-desc">Mayor descuento</option>
                        <option value="price-asc">Menor precio</option>
                        <option value="price-desc">Mayor precio</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="row" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Cargando ofertas...</span>
            </div>
            <p class="mt-3">Cargando las mejores ofertas...</p>
        </div>

        <!-- Empty State -->
        <div class="text-center py-5" id="emptyState" style="display: none;">
            <i class="fas fa-tags fa-3x mb-3" style="color: #d6d6d6;"></i>
            <h4>No se encontraron ofertas</h4>
            <p class="text-muted">Prueba ajustando tus filtros de búsqueda</p>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        let allProducts = [];
        const productsGrid = document.getElementById('productsGrid');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const discountFilter = document.getElementById('discountFilter');
        const sortSelect = document.getElementById('sortSelect');

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            startCountdown();
            
            // Event listeners para filtros
            searchInput.addEventListener('input', filterProducts);
            categoryFilter.addEventListener('change', filterProducts);
            discountFilter.addEventListener('change', filterProducts);
            sortSelect.addEventListener('change', filterProducts);
        });

        async function loadProducts() {
            try {
                loadingState.style.display = 'block';
                emptyState.style.display = 'none';

                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    // Cargar productos en oferta desde Firebase
                    const snapshot = await firebase.firestore()
                        .collection('products')
                        .where('category', '==', 'ofertas')
                        .where('onSale', '==', true)
                        .get();

                    allProducts = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                } else {
                    // Productos demo en oferta
                    allProducts = getDemoProducts();
                }

                displayProducts(allProducts);
            } catch (error) {
                console.error('Error cargando ofertas:', error);
                allProducts = getDemoProducts();
                displayProducts(allProducts);
            } finally {
                loadingState.style.display = 'none';
            }
        }

        function getDemoProducts() {
            return [
                {
                    id: 'offer1',
                    name: 'Collar de Perlas Premium',
                    originalPrice: 600.00,
                    price: 300.00,
                    discount: 50,
                    category: 'Bisutería',
                    description: 'Elegante collar de perlas con descuento especial',
                    image: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=300&h=300&fit=crop',
                    stock: 5,
                    onSale: true
                },
                {
                    id: 'offer2',
                    name: 'Set de Maquillaje Completo',
                    originalPrice: 800.00,
                    price: 560.00,
                    discount: 30,
                    category: 'Maquillaje',
                    description: 'Kit completo de maquillaje profesional',
                    image: 'https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=300&h=300&fit=crop',
                    stock: 8,
                    onSale: true
                },
                {
                    id: 'offer3',
                    name: 'Aretes de Acero Dorados',
                    originalPrice: 400.00,
                    price: 280.00,
                    discount: 30,
                    category: 'Acero',
                    description: 'Aretes de acero inoxidable con baño dorado',
                    image: 'https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=300&h=300&fit=crop',
                    stock: 12,
                    onSale: true
                },
                {
                    id: 'offer4',
                    name: 'Pulsera Acrílica Trendy',
                    originalPrice: 250.00,
                    price: 175.00,
                    discount: 30,
                    category: 'Acrílico',
                    description: 'Moderna pulsera acrílica de diseño exclusivo',
                    image: 'https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=300&h=300&fit=crop',
                    stock: 15,
                    onSale: true
                }
            ];
        }

        function filterProducts() {
            let filtered = [...allProducts];
            
            // Filtrar por búsqueda
            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(product => 
                    product.name.toLowerCase().includes(searchTerm) || 
                    (product.description && product.description.toLowerCase().includes(searchTerm))
                );
            }
            
            // Filtrar por categoría
            const categoryValue = categoryFilter.value;
            if (categoryValue) {
                filtered = filtered.filter(product => product.category === categoryValue);
            }
            
            // Filtrar por descuento mínimo
            const discountValue = parseInt(discountFilter.value);
            if (discountValue) {
                filtered = filtered.filter(product => product.discount >= discountValue);
            }
            
            // Ordenar
            const sortValue = sortSelect.value;
            switch (sortValue) {
                case 'discount-desc':
                    filtered.sort((a, b) => (b.discount || 0) - (a.discount || 0));
                    break;
                case 'price-asc':
                    filtered.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
            }
            
            displayProducts(filtered);
        }

        function displayProducts(products) {
            productsGrid.innerHTML = '';
            
            if (products.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'col-lg-3 col-md-4 col-sm-6 mb-4';
                
                const imageUrl = product.image || product.imageUrl || 'https://via.placeholder.com/300';
                const salePrice = `L.${parseFloat(product.price).toFixed(2)}`;
                const originalPrice = product.originalPrice ? `L.${parseFloat(product.originalPrice).toFixed(2)}` : '';
                const discount = product.discount || Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
                
                productCard.innerHTML = `
                    <div class="product-card h-100">
                        <div class="position-relative">
                            <img src="${imageUrl}" 
                                 class="product-img" 
                                 alt="${product.name}"
                                 onerror="this.src='https://via.placeholder.com/300'">
                            <div class="discount-badge">-${discount}%</div>
                            <div class="price-tag">${salePrice}</div>
                        </div>
                        <div class="card-body p-3">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="card-text text-muted small">${(product.description || '').substring(0, 60)}${product.description && product.description.length > 60 ? '...' : ''}</p>
                            <div class="mb-2">
                                <span class="badge bg-secondary">${product.category}</span>
                            </div>
                            <div class="price-info mb-3">
                                <div class="sale-price">${salePrice}</div>
                                ${originalPrice ? `<div class="original-price">${originalPrice}</div>` : ''}
                            </div>
                            <div class="input-group input-group-sm mb-2">
                                <input type="number" id="qty-${product.id}" class="form-control quantity-input" min="1" value="1">
                            </div>
                            <button class="btn btn-danger w-100" onclick="addToCart('${product.id}')">
                                <i class="fas fa-shopping-cart me-1"></i> ¡Aprovechar Oferta!
                            </button>
                        </div>
                    </div>
                `;
                productsGrid.appendChild(productCard);
            });
        }

        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            // Obtener carrito actual
            let cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            
            // Verificar si ya existe
            const qtyInput = document.getElementById('qty-' + productId);
            const qty = parseInt(qtyInput ? qtyInput.value : '1', 10) || 1;

            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    originalPrice: product.originalPrice,
                    image: product.image || product.imageUrl,
                    quantity: qty,
                    onSale: true
                });
            }
            
            // Guardar carrito
            localStorage.setItem('fashionCart', JSON.stringify(cart));
            
            // Mostrar notificación con SweetAlert
            Swal.fire({
                icon: 'success',
                title: 'Producto agregado',
                text: `¡${product.name} agregado al carrito (${qty} uds) con descuento!`,
                timer: 2000,
                showConfirmButton: false
            });
            
            // Actualizar contador
            updateCartCounter();
        }

        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            const badges = document.querySelectorAll('.cart-badge, .cart-counter, .cart-count');
            badges.forEach(el => {
                el.textContent = totalItems;
                el.style.display = totalItems > 0 ? 'inline' : 'none';
            });
        }

        function startCountdown() {
            // Establecer fecha de fin de oferta (7 días desde ahora)
            const endDate = new Date();
            endDate.setDate(endDate.getDate() + 7);
            
            function updateCountdown() {
                const now = new Date().getTime();
                const distance = endDate.getTime() - now;
                
                if (distance < 0) {
                    document.querySelector('.countdown-timer').innerHTML = '<h4>¡Oferta terminada!</h4>';
                    return;
                }
                
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                document.getElementById('days').textContent = days.toString().padStart(2, '0');
                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        // Actualizar contador al cargar
        document.addEventListener('DOMContentLoaded', updateCartCounter);
    </script>
</body>
</html>
