<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito Completo</title>
    <link rel="stylesheet" href="css/carrito_completo.css">
</head>
<body>
    <div class="container">
        <h1>Carrito de Compras</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cart-body"></tbody>
        </table>

        <div class="summary">
            <div>
                <p>Subtotal: <span id="subtotal">L0.00</span></p>
                <p>Envío: <span id="shipping-total">L0.00</span></p>
                <div>
                    <label><input type="radio" name="shipping" value="80" checked> San Pedro Sula (L80.00)</label>
                    <label><input type="radio" name="shipping" value="90"> Nacional (L90.00)</label>
                    <label><input type="radio" name="shipping" value="0"> Recoger en tienda (L0.00)</label>
                </div>
                <p>Descuento: <span id="discount">L0.00</span></p>
                <p class="total">Total: <span id="total">L0.00</span></p>
                <div>
                    <input type="text" id="coupon" placeholder="Código de cupón">
                    <button id="apply-coupon" class="primary">Aplicar</button>
                    <span id="coupon-msg"></span>
                </div>
            </div>
            <div class="buttons">
                <button id="update-btn" class="primary" type="button">Actualizar carrito</button>
                <button id="finalize-btn" class="primary" type="button" disabled>Finalizar compra</button>
            </div>
        </div>
    </div>

    <script src="js/carrito_completo.js"></script>
</body>
</html>
