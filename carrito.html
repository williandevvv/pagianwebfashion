<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Fashion Collection</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/carrito.css">
</head>
<body>
    <!-- Header -->
    <header class="header py-2">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <a class="navbar-brand me-5" href="index.html">
                        <h1 class="h4 text-white mb-0">Fashion Collection</h1>
                    </a>
                </div>
                <div class="d-flex align-items-center">
                    <a href="index.html" class="btn btn-outline-light me-2">
                        <i class="fas fa-arrow-left me-2"></i>Seguir Comprando 🛍️
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="row">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="cart-container">
                    <div class="p-4">
                        <h2 class="mb-4 emoji-title"><span>🛒</span>Carrito de Compras</h2>
                        <div id="cart-items">
                            <!-- Cart items will be dynamically loaded here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="summary-card sticky-lg-top" style="top: 100px;">
                    <h3 class="summary-title emoji-title"><span>📦</span>Resumen del Pedido</h3>
                    <div class="summary-item">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">L0.00</span>
                    </div>
                    <div class="summary-item">
                        <span>Envío</span>
                        <span id="cart-shipping">L0.00</span>
                    </div>
                    <div class="mb-3" id="shipping-options">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="shipping" id="shipping-sps" value="80" checked>
                            <label class="form-check-label" for="shipping-sps">San Pedro Sula (L80.00)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="shipping" id="shipping-nacional" value="120">
                            <label class="form-check-label" for="shipping-nacional">Nacional (L120.00)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="shipping" id="shipping-tienda" value="0">
                            <label class="form-check-label" for="shipping-tienda">Recoger en tienda (L0.00)</label>
                        </div>
                    </div>
                    <div class="summary-item" id="discount-row" style="display:none;">
                        <span>Descuento</span>
                        <span id="cart-discount">-L0.00</span>
                    </div>
                    <hr>
                    <div class="summary-item grand-total">
                        <span>Total</span>
                        <span id="cart-total">L0.00</span>
                    </div>
                    <form id="coupon-form" class="input-group mb-3">
                        <input type="text" id="coupon-code" class="form-control" placeholder="Código de cupón">
                        <button class="btn btn-outline-secondary" type="submit">Aplicar</button>
                    </form>
                    <p class="text-danger small" id="coupon-msg"></p>
                    <button id="update-cart-btn" class="btn btn-secondary w-100 mb-2">Actualizar carrito</button>
                    <button id="clear-cart-btn" class="btn btn-outline-danger w-100 mb-2">
                        <i class="fas fa-trash me-2"></i>Vaciar carrito
                    </button>
                    <button id="checkout-btn" class="btn btn-primary checkout-btn w-100 mt-2">
                        <i class="fas fa-lock me-2"></i>Proceder al Pago 💳
                    </button>
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            <i class="fas fa-shield-alt me-1"></i>
                            Pago seguro garantizado ✅
                        </small>
                    </div>
                </div>
            </div>
        </div>
</main>

    <!-- Recommended Products -->
    <section class="container my-5 recommended-section">
        <h3 class="mb-4 emoji-title"><span>✨</span>Te puede interesar</h3>
        <div class="row" id="recommended-items">
            <div class="col-md-4 mb-3">
                <div class="card product-item h-100 text-center">
                    <img src="img/bisuteria.jpg" class="card-img-top product-img" alt="Bisutería">
                    <div class="card-body">
                        <h5 class="product-title">Bisutería Elegante</h5>
                        <p class="product-price mb-2">L. 150.00</p>
                        <button class="btn btn-sm btn-outline-primary" onclick="cartManager.addToCart({id:'rec-bisuteria', name:'Bisutería Elegante', price:150, image:'img/bisuteria.jpg', stock:10});">Agregar al carrito</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card product-item h-100 text-center">
                    <img src="img/maquillaje.jpg" class="card-img-top product-img" alt="Maquillaje">
                    <div class="card-body">
                        <h5 class="product-title">Maquillaje Natural</h5>
                        <p class="product-price mb-2">L. 350.00</p>
                        <button class="btn btn-sm btn-outline-primary" onclick="cartManager.addToCart({id:'rec-maquillaje', name:'Maquillaje Natural', price:350, image:'img/maquillaje.jpg', stock:10});">Agregar al carrito</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card product-item h-100 text-center">
                    <img src="img/acero.jpg" class="card-img-top product-img" alt="Acero Inoxidable">
                    <div class="card-body">
                        <h5 class="product-title">Joyería de Acero</h5>
                        <p class="product-price mb-2">L. 200.00</p>
                        <button class="btn btn-sm btn-outline-primary" onclick="cartManager.addToCart({id:'rec-acero', name:'Joyería de Acero', price:200, image:'img/acero.jpg', stock:10});">Agregar al carrito</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast-notification" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <!-- Application Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/cart.js"></script>
    <script type="module" src="js/orders.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/maintenance.js"></script>
</body>
</html>
