<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/responsive.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acrílico - Fashion Collection</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        /* Paleta de colores pastel en tonos rosados */
        :root {
            --color-rose-gold: #f8c8dc;
            --color-shimmer: #ffeaf4;
            --color-nude: #fdd5e4;
            --color-blush: #ffe6e9;
            --color-accent: #eab5c4;
            --color-deep-rose: #d48ca2;
        }

        /* Estilos base */
        body {
            font-family: 'Poppins', sans-serif;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo con degradado animado inspirado en maquillaje */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg,
                    var(--color-rose-gold),
                    var(--color-shimmer),
                    var(--color-blush),
                    var(--color-accent));
            background-size: 400% 400%;
            z-index: -1;
            animation: gradientMove 20s ease infinite;
            opacity: 0.25;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .makeup-decorations {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .floating-makeup {
            position: fixed;
            font-size: 2rem;
            opacity: 0.1;
            animation: float 8s ease-in-out infinite;
        }

        .lipstick { top: 20%; left: 10%; animation-delay: 0s; }
        .brush { top: 60%; right: 15%; animation-delay: 2s; }
        .compact { bottom: 30%; left: 20%; animation-delay: 4s; }
        .sparkle { top: 40%; right: 30%; animation-delay: 6s; }

        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Encabezado degradado */
        .header {
            background: linear-gradient(135deg, var(--color-rose-gold), var(--color-accent));
            color: white;
            padding: 4rem 0;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        /* Tarjetas de producto */
        .product-card {
            transition: all 0.3s;
            border-radius: 15px;
            overflow: hidden;
            border: none;
            margin-bottom: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(192,108,132,0.15);
        }

        .product-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
            transition: all 0.3s;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .price-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, var(--color-accent), var(--color-deep-rose));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(192,108,132,0.2);
        }

        /* Barra de navegación */
        .navbar {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }

        .filter-controls {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            border: 1px solid var(--color-shimmer);
        }

        .quantity-input {
            max-width: 70px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid var(--color-accent);
        }

        /* Botones personalizados */
        .btn-primary {
            background: linear-gradient(135deg, var(--color-accent), var(--color-deep-rose));
            border: none;
            border-radius: 25px;
            padding: 0.8rem 2rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(192,108,132,0.3);
        }

        .btn-outline-primary {
            border-color: var(--color-accent);
            color: var(--color-accent);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .btn-outline-primary:hover {
            background-color: var(--color-shimmer);
            color: var(--color-accent);
        }

        .product-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product-card {
            width: 100%;
            max-width: 300px;
            background: #fff0f5;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            margin: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .product-image {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-image:hover img {
            transform: scale(1.05);
        }

        .price-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ffc8dd, #f9c6d3);
            color: #fff;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-title {
            font-size: 1.2rem;
            color: #a84d7a;
            margin: 10px 0 5px;
        }

        .product-description {
            font-size: 0.95rem;
            color: #7b2b51;
            margin-bottom: 15px;
        }

        .quantity-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        .quantity-btn {
            background: #ffc8dd;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .quantity-btn:hover {
            background: #f9a1bb;
        }

        .quantity-input {
            width: 50px;
            text-align: center;
            border: 1px solid #ffc8dd;
            border-radius: 8px;
            padding: 5px;
        }

        .add-to-cart {
            width: 100%;
            background: linear-gradient(135deg, #f9c6d3, #f7a4b8);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(249, 198, 211, 0.7);
        }
        img { max-width: 100%; height: auto; }
        iframe { max-width: 100%; }

    </style>
</head>
<body>
    <!-- Íconos flotantes para decorar la página -->
    <div class="makeup-decorations">
        <i class="fas fa-heart floating-makeup lipstick"></i>
        <i class="fas fa-magic floating-makeup brush"></i>
        <i class="fas fa-gem floating-makeup compact"></i>
        <i class="fas fa-star floating-makeup sparkle"></i>
    </div>
    <!-- Navbar -->
    <header class="sticky-top">
        <div class="container nav-wrapper">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-gem me-2" style="color: var(--color-accent);"></i>Fashion Collection
            </a>
            <button class="menu-toggle">☰</button>
            <nav class="navbar-links">
                <a class="nav-link" href="index.html">Inicio</a>
                <a class="nav-link" href="bisuteria.html">Bisutería</a>
                <a class="nav-link" href="maquillaje.html">Maquillaje</a>
                <a class="nav-link" href="acero.html">Acero</a>
                <a class="nav-link active" href="acrilico.html">Acrílico</a>
                <a class="nav-link" href="ofertas.html">Ofertas</a>
                <a class="btn btn-outline-primary ms-lg-3" href="carrito.html">
                    <i class="fas fa-shopping-cart me-1"></i> Carrito
                </a>
            </nav>
        </div>
    </header>

    <!-- Header -->
    <div class="header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Acrílico Colorido</h1>
            <p class="lead">Descubre nuestra vibrante colección de accesorios acrílicos</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Filter Controls -->
        <div class="filter-controls">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Buscar productos acrílicos...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sortSelect">
                        <option value="newest">Más recientes</option>
                        <option value="price-asc">Precio: menor a mayor</option>
                        <option value="price-desc">Precio: mayor a menor</option>
                        <option value="name-asc">Nombre: A-Z</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="colorFilter">
                        <option value="">Todos los colores</option>
                        <option value="transparente">Transparente</option>
                        <option value="colorido">Colorido</option>
                        <option value="negro">Negro</option>
                        <option value="blanco">Blanco</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" id="tipBtn">
                        <i class="fas fa-lightbulb me-1"></i> Tip de Acrílico
                    </button>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="product-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando productos...</span>
            </div>
            <p class="mt-3">Cargando productos acrílicos...</p>
        </div>

        <!-- Empty State -->
        <div class="text-center py-5" id="emptyState" style="display: none;">
            <i class="fas fa-palette fa-3x mb-3" style="color: #d6d6d6;"></i>
            <h4>No se encontraron productos</h4>
            <p class="text-muted">Prueba ajustando tus filtros de búsqueda</p>
        </div>

        <nav aria-label="Paginación" class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <script>
        let allProducts = [];
        let filteredProducts = [];
        let currentPage = 1;
        const productsPerPage = 30;
        const productsGrid = document.getElementById('productsGrid');
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const colorFilter = document.getElementById('colorFilter');

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            
            // Event listeners para filtros
            searchInput.addEventListener('input', filterProducts);
            sortSelect.addEventListener('change', filterProducts);
            colorFilter.addEventListener('change', filterProducts);
        });

        async function loadProducts() {
            try {
                loadingState.style.display = 'block';
                emptyState.style.display = 'none';

                if (typeof firebase !== 'undefined' && firebase.firestore) {
                    // Cargar desde Firebase
                    const snapshot = await firebase.firestore()
                        .collection('products')
                        .where('category', 'in', ['acrilico', 'Acrílico', 'acrílico', 'Acrilico'])
                        .get();

                    allProducts = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                } else {
                    // Productos demo
                    allProducts = getDemoProducts();
                }

                filteredProducts = allProducts;
                currentPage = 1;
                displayProducts(filteredProducts);
            } catch (error) {
                console.error('Error cargando productos:', error);
                allProducts = getDemoProducts();
                filteredProducts = allProducts;
                currentPage = 1;
                displayProducts(filteredProducts);
            } finally {
                loadingState.style.display = 'none';
            }
        }

        function getDemoProducts() {
            return [
                {
                    id: 'acr1',
                    name: 'Aretes Acrílicos Transparentes',
                    price: 180.00,
                    category: 'Acrílico',
                    description: 'Elegantes aretes acrílicos con diseño moderno',
                    image: 'https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=300&h=300&fit=crop',
                    stock: 20,
                    color: 'transparente'
                },
                {
                    id: 'acr2',
                    name: 'Pulsera Acrílica Colorida',
                    price: 220.00,
                    category: 'Acrílico',
                    description: 'Vibrante pulsera acrílica multicolor',
                    image: 'https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=300&h=300&fit=crop',
                    stock: 15,
                    color: 'colorido'
                },
                {
                    id: 'acr3',
                    name: 'Collar Acrílico Geométrico',
                    price: 350.00,
                    category: 'Acrílico',
                    description: 'Moderno collar con formas geométricas',
                    image: 'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=300&h=300&fit=crop',
                    stock: 10,
                    color: 'negro'
                }
            ];
        }

        function filterProducts() {
            let filtered = [...allProducts];
            
            // Filtrar por búsqueda
            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(product => 
                    product.name.toLowerCase().includes(searchTerm) || 
                    (product.description && product.description.toLowerCase().includes(searchTerm))
                );
            }
            
            // Filtrar por color
            const colorValue = colorFilter.value;
            if (colorValue) {
                filtered = filtered.filter(product => 
                    product.color === colorValue
                );
            }
            
            // Ordenar
            const sortValue = sortSelect.value;
            switch (sortValue) {
                case 'price-asc':
                    filtered.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
                case 'name-asc':
                    filtered.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                default: // newest
                    filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    break;
            }
            
            filteredProducts = filtered;
            currentPage = 1;
            displayProducts(filteredProducts);
        }

        function displayProducts(products) {
            const start = (currentPage - 1) * productsPerPage;
            const end = start + productsPerPage;
            const toShow = products.slice(start, end);

            productsGrid.innerHTML = '';

            if (toShow.length === 0) {
                emptyState.style.display = 'block';
                renderPagination(products.length);
                return;
            }

            emptyState.style.display = 'none';

            toShow.forEach(product => {
                const productCard = document.createElement('div');

                const imageUrl = product.image || product.imageUrl || 'https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=300&h=300&fit=crop';
                const formattedPrice = `L.${parseFloat(product.price).toFixed(2)}`;

                productCard.innerHTML = `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${imageUrl}" alt="${product.name}" onerror="this.src='https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=300&h=300&fit=crop'">
                            <div class="price-badge">${formattedPrice}</div>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <p class="product-description">${(product.description || '').substring(0, 60)}${product.description && product.description.length > 60 ? '...' : ''}</p>
                            <div class="quantity-selector">
                                <button class="quantity-btn" onclick="decreaseQuantity(this)">-</button>
                                <input type="number" id="qty-${product.id}" class="quantity-input" value="1" min="1">
                                <button class="quantity-btn" onclick="increaseQuantity(this)">+</button>
                            </div>
                            <button class="add-to-cart" onclick="addToCart('${product.id}')">🛒 Agregar al Carrito</button>
                        </div>
                    </div>
                `;
                productsGrid.appendChild(productCard);
            });

            renderPagination(products.length);
        }

        function renderPagination(totalItems) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;

            const totalPages = Math.ceil(totalItems / productsPerPage);
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${currentPage - 1}">Anterior</a>
                </li>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>`;
            }

            html += `
                <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" data-page="${currentPage + 1}">Siguiente</a>
                </li>`;

            pagination.innerHTML = html;
        }

        document.addEventListener('click', (e) => {
            if (e.target.closest('#pagination .page-link')) {
                e.preventDefault();
                const page = parseInt(e.target.dataset.page);
                const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
                if (!isNaN(page) && page >= 1 && page <= totalPages) {
                    currentPage = page;
                    displayProducts(filteredProducts);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        });

        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            // Obtener carrito actual
            let cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            
            // Verificar si ya existe
            const qtyInput = document.getElementById('qty-' + productId);
            const qty = parseInt(qtyInput ? qtyInput.value : '1', 10) || 1;

            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image || product.imageUrl,
                    quantity: qty
                });
            }
            
            // Guardar carrito
            localStorage.setItem('fashionCart', JSON.stringify(cart));
            
            // Mostrar notificación con SweetAlert
            Swal.fire({
                icon: 'success',
                title: 'Producto agregado',
                text: `${product.name} agregado al carrito (${qty} uds)`,
                timer: 2000,
                showConfirmButton: false
            });
            
            // Actualizar contador si existe
            updateCartCounter();
        }

        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('fashionCart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

            const badges = document.querySelectorAll('.cart-badge, .cart-counter, .cart-count');
            badges.forEach(el => {
                el.textContent = totalItems;
                el.style.display = totalItems > 0 ? 'inline' : 'none';
            });
        }

        // Consejos para productos acrílicos
        const tips = [
            'Limpia las piezas acrílicas con un paño suave para evitar rayones.',
            'Evita exponer el acrílico a fuentes de calor intenso.',
            'Lima suavemente los bordes para un acabado perfecto.',
            'Guarda los artículos acrílicos en un lugar fresco y seco.'
        ];

        document.getElementById('tipBtn').addEventListener('click', () => {
            const tip = tips[Math.floor(Math.random() * tips.length)];
            Swal.fire('Consejo de acrílico', tip, 'info');
        });

        // Actualizar contador al cargar
        document.addEventListener('DOMContentLoaded', updateCartCounter);
    </script>
    <script src="js/responsive-navbar.js"></script>
    <script type="module" src="js/maintenance.js"></script>
    <script>
    function increaseQuantity(button) {
        const input = button.parentElement.querySelector('.quantity-input');
        input.value = parseInt(input.value) + 1;
    }

    function decreaseQuantity(button) {
        const input = button.parentElement.querySelector('.quantity-input');
        if (parseInt(input.value) > 1) {
            input.value = parseInt(input.value) - 1;
        }
    }
    </script>
</body>
